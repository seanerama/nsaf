<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSAF — Codebase Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#toolbar h1{font-size:14px;color:#58a6ff;white-space:nowrap}
#toolbar .sep{width:1px;height:20px;background:#30363d}
.toggle{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:12px;border:1px solid #30363d;user-select:none;transition:all .2s}
.toggle.active{border-color:var(--c);background:color-mix(in srgb,var(--c) 15%,transparent)}
.toggle .dot{width:8px;height:8px;border-radius:50%;background:var(--c)}
#search{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:6px;font-size:12px;width:180px}
#search:focus{outline:none;border-color:#58a6ff}
#canvas{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas.dragging{cursor:grabbing}
#world{position:absolute;transform-origin:0 0;transition:transform .1s ease-out}
.node{position:absolute;background:#161b22;border:2px solid var(--c,#30363d);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;min-width:140px;max-width:220px}
.node:hover{transform:scale(1.05);z-index:10;box-shadow:0 0 20px color-mix(in srgb,var(--c) 30%,transparent)}
.node.selected{box-shadow:0 0 0 2px var(--c),0 0 30px color-mix(in srgb,var(--c) 40%,transparent)}
.node .title{font-size:12px;font-weight:600;color:var(--c);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .subtitle{font-size:10px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;background:color-mix(in srgb,var(--c) 20%,transparent);color:var(--c);margin-top:4px}
svg.connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
svg.connections path{fill:none;stroke-width:1.5;opacity:.4;transition:opacity .2s}
svg.connections path.highlighted{stroke-width:2.5;opacity:.9}
svg.connections path.animated{stroke-dasharray:8 4;animation:flowDash 1s linear infinite}
@keyframes flowDash{to{stroke-dashoffset:-12}}
#detail{position:fixed;right:0;top:44px;bottom:0;width:340px;background:#161b22;border-left:1px solid #30363d;padding:16px;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;z-index:50;font-size:12px}
#detail.open{transform:translateX(0)}
#detail h2{font-size:14px;color:#58a6ff;margin-bottom:8px}
#detail h3{font-size:12px;color:#f0883e;margin:12px 0 4px}
#detail .close{position:absolute;top:8px;right:12px;cursor:pointer;color:#8b949e;font-size:18px}
#detail .file{color:#7ee787;font-family:monospace;font-size:11px}
#detail .conn{padding:4px 0;border-bottom:1px solid #21262d}
#detail .conn .dir{color:#8b949e;font-size:10px}
#detail .tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;margin:2px;background:#21262d;color:#c9d1d9}
#minimap{position:fixed;bottom:12px;left:12px;width:180px;height:120px;background:#161b22;border:1px solid #30363d;border-radius:6px;z-index:50;overflow:hidden}
#minimap canvas{width:100%;height:100%}
#legend{position:fixed;bottom:12px;right:12px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;z-index:50;font-size:10px;display:flex;gap:12px;flex-wrap:wrap}
#legend .item{display:flex;align-items:center;gap:4px}
#legend .swatch{width:10px;height:10px;border-radius:3px}
.hidden{display:none !important}
</style>
</head>

<div id="toolbar">
  <h1>NSAF Codebase Map</h1>

// State
let zoom=1,panX=0,panY=0,dragStart=null,selected=null;
const hiddenLayers=new Set();
const world=document.getElementById('world');
const canvas=document.getElementById('canvas');
const svg=document.getElementById('svg');

// Render nodes
function renderNodes(){
  document.querySelectorAll('.node').forEach(n=>n.remove());
  nodes.forEach(n=>{
    if(hiddenLayers.has(n.layer))return;
    const el=document.createElement('div');
    el.className='node';
    el.id='node-'+n.id;
    el.style.cssText=`left:${n.x}px;top:${n.y}px;--c:${COLORS[n.layer]}`;
    el.innerHTML=`<div class="title">${n.label}</div><div class="subtitle">${n.sub}</div><div class="badge">${n.layer}</div>`;
    el.onclick=(e)=>{e.stopPropagation();selectNode(n)};
    world.appendChild(el);
  });
}

  svg.innerHTML='';
  connections.forEach(c=>{
    const fn=nodes.find(n=>n.id===c.from);
    const tn=nodes.find(n=>n.id===c.to);
    if(!fn||!tn)return;
    if(hiddenLayers.has(fn.layer)&&hiddenLayers.has(tn.layer))return;

    const x1=fn.x+80,y1=fn.y+25;
    const x2=tn.x+80,y2=tn.y+25;
    const mx=(x1+x2)/2;
    const d=`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('stroke',c.color);
    path.dataset.from=c.from;
    path.dataset.to=c.to;
    if(c.animated)path.classList.add('animated');
    svg.appendChild(path);
  });
}

// Select node
function selectNode(n){
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('selected'));
  const el=document.getElementById('node-'+n.id);
  if(el)el.classList.add('selected');
  selected=n;

  // Highlight connections
  svg.querySelectorAll('path').forEach(p=>{
    p.classList.toggle('highlighted',p.dataset.from===n.id||p.dataset.to===n.id);
  });

  // Detail panel
  const connsFrom=connections.filter(c=>c.from===n.id).map(c=>nodes.find(x=>x.id===c.to)).filter(Boolean);
  const connsTo=connections.filter(c=>c.to===n.id).map(c=>nodes.find(x=>x.id===c.from)).filter(Boolean);

  let html=`<h2>${n.label}</h2><div class="subtitle" style="margin-bottom:8px">${n.sub}</div>`;
  html+=`<div class="file">${n.file}</div>`;
  html+=`<p style="margin:8px 0;color:#8b949e">${n.desc}</p>`;

  if(n.exports&&n.exports.length){
    html+=`<h3>Exports</h3>`;
    n.exports.forEach(e=>html+=`<span class="tag">${e}</span>`);
  }
  if(connsFrom.length){
    html+=`<h3>Connects To (${connsFrom.length})</h3>`;
    connsFrom.forEach(t=>html+=`<div class="conn"><span style="color:${COLORS[t.layer]}">${t.label}</span> <span class="dir">${t.sub}</span></div>`);
  }
  if(connsTo.length){
    html+=`<h3>Connected From (${connsTo.length})</h3>`;
    connsTo.forEach(t=>html+=`<div class="conn"><span style="color:${COLORS[t.layer]}">${t.label}</span> <span class="dir">${t.sub}</span></div>`);
  }

  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('selected'));
  svg.querySelectorAll('path').forEach(p=>p.classList.remove('highlighted'));
  selected=null;
}

// Layer toggle
function toggleLayer(el){
  const layer=el.dataset.layer;
  el.classList.toggle('active');
  if(el.classList.contains('active'))hiddenLayers.delete(layer);
  else hiddenLayers.add(layer);
  renderNodes();
  renderConnections();
}

// Search
function searchNodes(q){
  q=q.toLowerCase();
  document.querySelectorAll('.node').forEach(el=>{
    const n=nodes.find(n=>'node-'+n.id===el.id);
    if(!n)return;
    const match=!q||n.label.toLowerCase().includes(q)||n.sub.toLowerCase().includes(q)||n.file.toLowerCase().includes(q)||(n.desc||'').toLowerCase().includes(q);
    el.style.opacity=match?1:0.15;
  });
}

// Pan & zoom
canvas.addEventListener('mousedown',e=>{
  if(e.target.closest('.node'))return;
  dragStart={x:e.clientX-panX,y:e.clientY-panY};
  canvas.classList.add('dragging');
});
canvas.addEventListener('mousemove',e=>{
  if(!dragStart)return;
  panX=e.clientX-dragStart.x;
  panY=e.clientY-dragStart.y;
  updateTransform();
});
canvas.addEventListener('mouseup',()=>{dragStart=null;canvas.classList.remove('dragging')});
canvas.addEventListener('mouseleave',()=>{dragStart=null;canvas.classList.remove('dragging')});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;
  panX=mx-(mx-panX)*delta;
  panY=my-(my-panY)*delta;
  zoom*=delta;
  zoom=Math.max(0.3,Math.min(3,zoom));
  updateTransform();
},{passive:false});

canvas.addEventListener('click',e=>{
  if(!e.target.closest('.node'))closeDetail();
});

function updateTransform(){
  world.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
}

// Init
renderNodes();
renderConnections();
panX=100;panY=-20;
updateTransform();
</script>
</body>
</html>
